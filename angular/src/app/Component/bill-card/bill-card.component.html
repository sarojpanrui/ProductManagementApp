<div class="card shadow-sm border-0 rounded-4 h-100">
  <div class="card-body d-flex flex-column bill-card">

    <!-- Header -->
    <div class="mb-2">
      <h5 class="fw-bold text-primary mb-1">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle-user-icon lucide-circle-user"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"/></svg>
        {{ bill.customer }}
      </h5>
      <small class="text-muted">
        
        Bill ID: {{ bill.id }}
      </small>
    </div>

    <!-- Amount -->
    <div class="mb-3">
      <span class="fs-5 fw-semibold text-success">
        ₹ {{ bill.totalAmount }}
      </span>
    </div>

    <!-- Products Preview -->
    <div class="mb-3">
      <small class="text-muted">Products</small>
      <p class="mb-0 small text-truncate">
        {{ bill.buyProducts }}
      </p>
    </div>

    <!-- Actions -->
    <div class="d-flex gap-2 mt-auto">

      <button
        class="btn btn-outline-danger btn-sm w-100"
        (click)="delete(bill.id)">
         <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-trash-icon lucide-trash"><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>

      <button
        class="btn btn-outline-primary btn-sm w-100"
        (click)="openEditForm()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square-pen-icon lucide-square-pen"><path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z"/></svg>
      </button>

      <button
        type="button"
        class="btn btn-outline-success btn-sm w-100"
        [routerLink]="['/viewbill', bill.id]">
         <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-icon lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
      </button>

    </div>

  </div>
</div>

<abp-modal [(visible)]="isOpen">
  <ng-template #abpHeader>
    <h3>Update Bill</h3>
  </ng-template>

  <ng-template #abpBody>
    <form id="billForm" [formGroup]="form" (ngSubmit)="edit(bill.id)">
      <div class="mt-3">
        <label>Customer <span class="text-danger">*</span></label>
        <input type="text" class="form-control" formControlName="customer" autofocus />
      </div>

      <div class="mt-3">
        <label>Total Amount <span class="text-danger">*</span></label>
        <input type="number" class="form-control" formControlName="totalAmount" />
      </div>

      <div class="mt-3">
        <label>Buy Products <span class="text-danger">*</span></label>
        <textarea class="form-control" rows="3" formControlName="buyProducts"> </textarea>
      </div>
    </form>
  </ng-template>

  <ng-template #abpFooter>
    <button type="button" class="btn btn-secondary" abpClose (click)="closeForm()">Close</button>

    <button type="submit" form="billForm" class="btn btn-primary" [disabled]="form.invalid">
      Save Bill
    </button>
  </ng-template>
</abp-modal>
