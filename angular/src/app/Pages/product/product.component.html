<div class="container mt-4">

  <!-- Navbar / Header -->
  <nav class="navbar bg-white shadow-sm px-4 py-3 rounded-4 mb-4 sticky-top">

    <div class="container-fluid p-0 d-flex align-items-center justify-content-between flex-wrap gap-3">

      <!-- Title -->
      <h3 class="fw-bold text-primary m-0">
        My Products
      </h3>

      <!-- Search + Button -->
      <div class="d-flex align-items-center gap-2 flex-grow-1 justify-content-end">

        <div class="input-group" style="max-width: 350px;">


          <input type="text" class="form-control border-start-0 rounded-pill" placeholder="Search products..."
            [(ngModel)]="searchText" />
        </div>

        <button class="btn btn-outline-secondary rounded-pill" type="button" (click)="searchText=''">
          Clear
        </button>

        <button class="btn btn-success rounded-pill px-4 shadow-sm" type="button" (click)="openForm()">
          + Add
        </button>

        <div class="d-flex align-items-center gap-2 flex-grow-1 justify-content-end flex-wrap">
          <select class="form-select rounded-pill" style="max-width: 150px;" [(ngModel)]="quantityFilter">
            <option value="">All</option>
            <option value="20">
              < 20</option>
            <option value="50">
              < 50</option>
            <option value="100">
              < 100</option>
          </select>
        </div>

      </div>

    </div>
  </nav>

  <!-- Product Grid -->
  <div class="row g-3">
    @for (p of filteredProducts; track p.id) {
    <div class="col-lg-3 col-md-4 col-sm-6">
      <app-product-card [product]="p" (deleted)="delete($event)" (updated)="fetchProduct()">
      </app-product-card>
    </div>
    }
  </div>

  <!-- Empty State -->
  @if (filteredProducts.length === 0) {
  <div class="text-center mt-5 text-muted">
    <h5>No products found</h5>
  </div>
  }

</div>

<abp-modal [(visible)]="isOpen">
  <ng-template #abpHeader>
    <h3>Create New Product</h3>
  </ng-template>

  <ng-template #abpBody>
    <form id="productForm" [formGroup]="form" (ngSubmit)="create()">
      <div class="mt-3">
        <label>Name <span class="text-danger">*</span></label>
        <input type="text" class="form-control" formControlName="name" placeholder="Enter product name" autofocus />
      </div>

      <div class="mt-3">
        <label>Description</label>
        <textarea class="form-control" rows="3" formControlName="description" placeholder="Enter product description">
        </textarea>
      </div>

      <div class="mt-3">
        <label>Price <span class="text-danger">*</span></label>
        <input type="number" class="form-control" formControlName="price" placeholder="Enter price" />
      </div>

      <div class="mt-3">
        <label>Quantity <span class="text-danger">*</span></label>
        <input type="number" class="form-control" formControlName="quantity" placeholder="Enter quantity" />
      </div>
    </form>
  </ng-template>

  <ng-template #abpFooter>
    <button type="button" class="btn btn-secondary" abpClose (click)="closeForm()">Close</button>

    <button type="submit" form="productForm" class="btn btn-primary" [disabled]="form.invalid">
      Save Product
    </button>
  </ng-template>
</abp-modal>
